<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CY资源宝库 - 发现你想要的资源</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --dark-100: #1e293b;
      --dark-200: #1a2332;
      --dark-300: #151d2e;
      --dark-400: #0f172a;
      --dark-500: #0a0f1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 50%, #1a2332 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(14, 165, 233, 0.3);
      border-radius: 4px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ========== 导航栏 ========== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 0;
      transition: all 0.3s;
    }

    .navbar.scrolled {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      padding: 10px 0;
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #38bdf8;
    }

    /* ========== Hero Section ========== */
    .hero {
      padding: 140px 0 80px;
      text-align: center;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, #38bdf8 50%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .hero-subtitle {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* ========== 搜索框 ========== */
    .search-box {
      max-width: 700px;
      margin: 0 auto 30px;
    }

    .search-container {
      display: flex;
      background: rgba(30, 41, 59, 0.8);
      border: 2px solid rgba(14, 165, 233, 0.3);
      border-radius: 16px;
      padding: 6px;
      transition: all 0.3s;
    }

    .search-container:focus-within {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.2);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 20px;
      font-size: 16px;
      color: #fff;
      outline: none;
    }

    .search-input::placeholder {
      color: #64748b;
    }

    .search-btn {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .search-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
    }

    /* ========== 分类标签 ========== */
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .category-tab {
      padding: 8px 20px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      color: #94a3b8;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-tab:hover,
    .category-tab.active {
      background: rgba(14, 165, 233, 0.2);
      border-color: #0ea5e9;
      color: #0ea5e9;
    }

    /* ========== 统计信息 ========== */
    .stats {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-bottom: 50px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #38bdf8;
    }

    .stat-label {
      font-size: 14px;
      color: #64748b;
    }

    /* ========== 资源列表 ========== */
    .section {
      padding: 50px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ========== 资源卡片 ========== */
    .resource-card {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid #1e293b;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }

    .resource-card:hover {
      border-color: rgba(14, 165, 233, 0.3);
      box-shadow: 0 12px 28px rgba(14, 165, 233, 0.1);
      transform: translateY(-2px);
    }

    .card-badges {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .card-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-category {
      background: rgba(14, 165, 233, 0.2);
      color: #38bdf8;
    }

    .badge-hot {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .badge-new {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .card-content {
      padding: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 12px;
      color: #64748b;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(14, 165, 233, 0.15);
      color: #0ea5e9;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    .card-link:hover {
      background: rgba(14, 165, 233, 0.25);
    }

    /* ========== 空状态 ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
    }

    .empty-desc {
      font-size: 14px;
      color: #64748b;
    }

    /* ========== 加载状态 ========== */
    .loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(14, 165, 233, 0.3);
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== 在线人数 ========== */
    .online-users {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      margin-top: 30px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(14, 165, 233, 0.2);
      border-radius: 50px;
      font-size: 13px;
      color: #94a3b8;
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: onlinePulse 2s ease-in-out infinite;
    }

    @keyframes onlinePulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    /* ========== 页脚 ========== */
    .footer {
      padding: 40px 0;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer-text {
      font-size: 14px;
      color: #64748b;
    }

    /* ========== 移动端适配 ========== */
    @media (max-width: 768px) {
      .hero {
        padding: 120px 0 50px;
      }

      .hero-title {
        font-size: 32px;
      }

      .hero-subtitle {
        font-size: 15px;
      }

      .search-container {
        flex-direction: column;
        padding: 8px;
      }

      .search-input {
        padding: 12px 16px;
      }

      .search-btn {
        width: 100%;
        padding: 12px;
      }

      .stats {
        gap: 30px;
      }

      .stat-value {
        font-size: 24px;
      }

      .resources-grid {
        grid-template-columns: 1fr;
      }

      .category-tabs {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
      }

      .category-tab {
        flex-shrink: 0;
      }
    }

    /* ========== 模态框 ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      padding: 30px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #f1f5f9;
    }

    .modal-info {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .modal-info p {
      margin-bottom: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .modal-info strong {
      color: #fff;
    }

    .copy-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      transform: scale(1.02);
    }

    .copy-success {
      text-align: center;
      color: #10b981;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-inner">
        <a href="#" class="logo">
          <div class="logo-icon">📦</div>
          <span class="logo-text">CY资源宝库</span>
        </a>
        <div class="nav-right">
          <a href="#resources" class="nav-link">精选推荐</a>
          <a href="#community" class="nav-link">交流社群</a>
          <a href="#categories" class="nav-link">浏览分类</a>
          <a href="#feedback" class="nav-link">资源反馈</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-title">发现你想要的资源</h1>
      <p class="hero-subtitle">海量学习资料、视频教程，一键搜索，即刻获取</p>
      
      <!-- 搜索框 -->
      <div class="search-box">
        <div class="search-container">
          <input 
            type="text" 
            class="search-input" 
            id="searchInput" 
            placeholder="搜索资源名称，如：Python入门、PS教程..."
            onkeyup="handleSearch(event)"
          >
          <button class="search-btn" onclick="performSearch()">
            🔍 搜索
          </button>
        </div>
      </div>

      <!-- 分类标签 -->
      <div class="category-tabs" id="categoryTabs">
        <span class="category-tab active" onclick="selectCategory('全部')">全部</span>
        <span class="category-tab" onclick="selectCategory('教程')">📚 教程</span>
        <span class="category-tab" onclick="selectCategory('软件')">💻 软件</span>
        <span class="category-tab" onclick="selectCategory('素材')">🎨 素材</span>
        <span class="category-tab" onclick="selectCategory('文档')">📄 文档</span>
        <span class="category-tab" onclick="selectCategory('视频')">🎬 视频</span>
        <span class="category-tab" onclick="selectCategory('其他')">📦 其他</span>
      </div>

      <!-- 统计 -->
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalCount">--</div>
          <div class="stat-label">精选资源</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">4</div>
          <div class="stat-label">网盘平台</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">24h</div>
          <div class="stat-label">实时更新</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 资源列表 -->
  <section class="section" id="resources">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">
          <span>📦</span>
          <span id="sectionTitleText">精选推荐</span>
        </h2>
      </div>

      <div class="resources-grid" id="resourcesGrid">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在加载资源...</p>
        </div>
      </div>

      <!-- 在线人数 -->
      <div class="online-users">
        <div class="online-indicator"></div>
        <span>当前 <strong id="onlineCount">0</strong> 人正在浏览</span>
      </div>
    </div>
  </section>

  <!-- 资源详情模态框 -->
  <div class="modal" id="resourceModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3 class="modal-title" id="modalTitle">资源标题</h3>
      <div class="modal-info">
        <p><strong>资源分类：</strong><span id="modalCategory">教程</span></p>
        <p><strong>网盘链接：</strong><span id="modalLink">https://...</span></p>
        <p><strong>提取码：</strong><span id="modalCode">----</span></p>
        <p><strong>浏览次数：</strong><span id="modalViews">0</span></p>
      </div>
      <button class="copy-btn" onclick="copyLink()">复制链接和提取码</button>
      <p class="copy-success" id="copySuccess">✅ 已复制到剪贴板！</p>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2024 CY资源宝库 · 让资源触手可及</p>
    </div>
  </footer>

  <script>
    // ========== Supabase 配置 ==========
    const SUPABASE_URL = 'https://musrilmjolaquhnfqjdu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OR14RWa1W_BkxTk160EECg_7YS7xafd';

    // ========== 全局状态 ==========
    let currentCategory = '全部';
    let currentSearch = '';
    let currentResource = null;

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      loadResources();
      updateOnlineCount();
      
      // 导航栏滚动效果
      window.addEventListener('scroll', function() {
        const navbar = document.querySelector('.navbar');
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      });
    });

    // ========== 加载资源 ==========
    async function loadResources() {
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在加载资源...</p>
        </div>
      `;

      try {
        let url = `${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`;

        if (currentCategory !== '全部') {
          url += `&category=eq.${encodeURIComponent(currentCategory)}`;
        }

        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!response.ok) throw new Error('获取数据失败');

        const resources = await response.json();

        // 更新总数
        document.getElementById('totalCount').textContent = resources.length || 0;

        // 渲染资源
        renderResources(resources);

      } catch (error) {
        console.error('Error:', error);
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">😅</div>
            <h3 class="empty-title">加载失败</h3>
            <p class="empty-desc">请检查网络连接后刷新重试</p>
          </div>
        `;
      }
    }

    // ========== 搜索功能 ==========
    async function performSearch() {
      const input = document.getElementById('searchInput');
      currentSearch = input.value.trim();
      
      if (currentSearch) {
        const grid = document.getElementById('resourcesGrid');
        grid.innerHTML = `
          <div class="loading">
            <div class="loading-spinner"></div>
            <p>正在搜索...</p>
          </div>
        `;

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/resources?title=ilike.*${encodeURIComponent(currentSearch)}*&order=created_at.desc`,
            {
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
              }
            }
          );

          const resources = await response.json();
          document.getElementById('totalCount').textContent = resources.length || 0;
          renderResources(resources);

        } catch (error) {
          console.error('Search error:', error);
        }
      } else {
        loadResources();
      }
    }

    function handleSearch(event) {
      if (event.key === 'Enter') {
        performSearch();
      }
    }

    // ========== 分类选择 ==========
    function selectCategory(category) {
      currentCategory = category;
      
      // 更新标签样式
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.textContent.includes(category) || (category === '全部' && tab.textContent === '全部')) {
          tab.classList.add('active');
        }
      });

      // 更新标题
      document.getElementById('sectionTitleText').textContent = 
        category === '全部' ? '精选推荐' : category + '资源';

      // 清空搜索
      document.getElementById('searchInput').value = '';
      currentSearch = '';

      // 重新加载
      loadResources();
    }

    // ========== 渲染资源 ==========
    function renderResources(resources) {
      const grid = document.getElementById('resourcesGrid');

      if (!resources || resources.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3 class="empty-title">暂无相关资源</h3>
            <p class="empty-desc">试试其他关键词，或联系管理员添加</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = resources.map(resource => `
        <div class="resource-card" onclick="showResourceDetail(${resource.id})">
          <div class="card-badges">
            <span class="card-badge badge-category">${resource.category}</span>
            ${resource.views > 100 ? '<span class="card-badge badge-hot">🔥 热门</span>' : ''}
          </div>
          <div class="card-content">
            <h3 class="card-title">${escapeHtml(resource.title)}</h3>
            <p class="card-desc">${escapeHtml(resource.description || '暂无描述')}</p>
            <div class="card-footer">
              <div class="card-meta">
                <span>👁 ${resource.views || 0}</span>
                <span>📅 ${formatDate(resource.created_at)}</span>
              </div>
              <span class="card-link">查看详情 →</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ========== 显示资源详情 ==========
    async function showResourceDetail(id) {
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        const resources = await response.json();
        if (resources && resources.length > 0) {
          currentResource = resources[0];
          
          document.getElementById('modalTitle').textContent = currentResource.title;
          document.getElementById('modalCategory').textContent = currentResource.category;
          document.getElementById('modalLink').textContent = currentResource.pan_link;
          document.getElementById('modalCode').textContent = currentResource.extract_code || '无';
          document.getElementById('modalViews').textContent = currentResource.views || 0;
          
          document.getElementById('resourceModal').classList.add('show');
          
          // 增加浏览次数
          incrementViews(id);
        }
      } catch (error) {
        console.error('Error loading resource:', error);
      }
    }

    // ========== 增加浏览次数 ==========
    async function incrementViews(id) {
      try {
        await fetch(
          `${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`,
          {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              views: (currentResource?.views || 0) + 1
            })
          }
        );
      } catch (error) {
        console.error('Error updating views:', error);
      }
    }

    // ========== 复制链接 ==========
    function copyLink() {
      if (!currentResource) return;
      
      const text = `链接：${currentResource.pan_link}\n提取码：${currentResource.extract_code || '无'}`;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copySuccess').style.display = 'block';
        setTimeout(() => {
          document.getElementById('copySuccess').style.display = 'none';
        }, 2000);
      });
    }

    // ========== 关闭模态框 ==========
    function closeModal() {
      document.getElementById('resourceModal').classList.remove('show');
      currentResource = null;
    }

    // 点击背景关闭
    document.getElementById('resourceModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // ========== 在线人数 ==========
    function updateOnlineCount() {
      let baseCount = parseInt(localStorage.getItem('onlineBaseCount')) || 156;
      const randomOffset = Math.floor(Math.random() * 30) - 15;
      const onlineCount = Math.max(50, baseCount + randomOffset);
      document.getElementById('onlineCount').textContent = (onlineCount * 100).toLocaleString();
    }

    setInterval(updateOnlineCount, 5000);

    document.addEventListener('visibilitychange', function() {
      let baseCount = parseInt(localStorage.getItem('onlineBaseCount')) || 156;
      if (document.hidden) {
        baseCount = Math.max(50, baseCount - 1);
      } else {
        baseCount = Math.min(300, baseCount + 1);
      }
      localStorage.setItem('onlineBaseCount', baseCount);
      updateOnlineCount();
    });

    // ========== 工具函数 ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      if (!dateString) return '--';
      const date = new Date(dateString);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}月${day}日`;
    }
  </script>
</body>
</html>
