<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务日志 - 每日资源采集系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                    </svg>
                    <span class="text-xl font-bold">每日资源采集系统</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 标签导航 -->
    <div class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex space-x-8">
                <a href="/" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    📊 仪表盘
                </a>
                <a href="/config.html" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    ⚙️ 网盘配置
                </a>
                <a href="/logs.html" class="tab-link py-4 px-2 border-b-2 border-purple-500 text-purple-600 font-medium">
                    📋 任务日志
                </a>
                <a href="/submit.html" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    ➕ 手动提交
                </a>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 筛选 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex items-center">
                    <label class="text-sm text-gray-600 mr-2">任务类型:</label>
                    <select id="filterType" onchange="loadLogs()" class="px-3 py-2 border rounded-lg text-sm">
                        <option value="">全部</option>
                        <option value="collect">采集</option>
                        <option value="transfer">转存</option>
                        <option value="manual">手动</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <label class="text-sm text-gray-600 mr-2">状态:</label>
                    <select id="filterStatus" onchange="loadLogs()" class="px-3 py-2 border rounded-lg text-sm">
                        <option value="">全部</option>
                        <option value="running">执行中</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
                <button onclick="loadLogs()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm">
                    🔍 搜索
                </button>
            </div>
        </div>

        <!-- 日志列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">任务类型</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">执行时间</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">耗时</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">状态</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">详情</th>
                        </tr>
                    </thead>
                    <tbody id="logsList" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="px-4 py-12 text-center text-gray-400">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="px-4 py-3 border-t flex justify-between items-center">
                <div class="text-sm text-gray-500">共 <span id="totalLogs">0</span> 条记录</div>
                <div class="flex gap-2">
                    <button onclick="prevPage()" id="prevBtn" class="px-3 py-1 border rounded hover:bg-gray-50 disabled:opacity-50" disabled>‹ 上一页</button>
                    <span class="px-3 py-1 text-sm text-gray-600">第 <span id="currentPage">1</span> 页</span>
                    <button onclick="nextPage()" id="nextBtn" class="px-3 py-1 border rounded hover:bg-gray-50 disabled:opacity-50" disabled>下一页 ›</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://musrilmjolaquhnfqjdu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11c3JpbG1qb2xhcWhuZnFqZHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTYyMzg3MDAsImV4cCI6MjAzMTgxNDcwMH0.gLl4KZJ6LK7sRBB5c8GJ4I0i_Xf6X8KQ8TqF6v6Q5r0';

        let supabase;
        let currentPage = 1;
        const pageSize = 20;

        async function init() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await loadLogs();
        }

        async function loadLogs(page = 1) {
            currentPage = page;
            
            const taskType = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;

            try {
                let query = supabase
                    .from('task_logs')
                    .select('*', { count: 'exact' })
                    .order('created_at', { ascending: false })
                    .range((page - 1) * pageSize, page * pageSize - 1);

                if (taskType) {
                    query = query.eq('task_type', taskType);
                }
                if (status) {
                    query = query.eq('status', status);
                }

                const { data, error, count } = await query;

                if (error) throw error;

                renderLogs(data || []);
                
                document.getElementById('totalLogs').textContent = count || 0;
                document.getElementById('currentPage').textContent = page;
                document.getElementById('prevBtn').disabled = page <= 1;
                document.getElementById('nextBtn').disabled = page >= Math.ceil((count || 0) / pageSize);
            } catch (error) {
                console.error('加载日志失败:', error);
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('logsList');

            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-12 text-center text-gray-400">暂无日志记录</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const summary = typeof log.summary === 'string' ? JSON.parse(log.summary) : (log.summary || {});
                const collected = summary.collected || 0;

                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">${getTaskTypeBadge(log.task_type)}</td>
                        <td class="px-4 py-3 text-sm">
                            <div class="text-gray-800">${formatDateTime(log.start_time)}</div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600">${log.duration ? log.duration + '秒' : '-'}</td>
                        <td class="px-4 py-3">${getStatusBadge(log.status)}</td>
                        <td class="px-4 py-3 text-sm">
                            ${collected > 0 ? `<span class="text-green-600">📥 ${collected}个</span>` : ''}
                            ${log.error ? `<div class="text-red-500 text-xs">❌ ${log.error.substring(0, 50)}...</div>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getTaskTypeBadge(type) {
            const badges = {
                'collect': '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">🔍 采集</span>',
                'transfer': '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">📤 转存</span>',
                'manual': '<span class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs">✋ 手动</span>',
                'all': '<span class="px-2 py-1 bg-purple-100 text-purple-700 rounded text-xs">🔄 全部</span>'
            };
            return badges[type] || badges['all'];
        }

        function getStatusBadge(status) {
            const badges = {
                'running': '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs animate-pulse">🔄 执行中</span>',
                'success': '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">✅ 成功</span>',
                'failed': '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs">❌ 失败</span>'
            };
            return badges[status] || badges['success'];
        }

        function formatDateTime(timeStr) {
            if (!timeStr) return '-';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function prevPage() {
            if (currentPage > 1) loadLogs(currentPage - 1);
        }

        function nextPage() {
            const total = parseInt(document.getElementById('totalLogs').textContent);
            if (currentPage < Math.ceil(total / pageSize)) loadLogs(currentPage + 1);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
