<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网盘配置 - 每日资源采集系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                    </svg>
                    <span class="text-xl font-bold">每日资源采集系统</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 标签导航 -->
    <div class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex space-x-8">
                <a href="/" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    📊 仪表盘
                </a>
                <a href="/config.html" class="tab-link py-4 px-2 border-b-2 border-purple-500 text-purple-600 font-medium">
                    ⚙️ 网盘配置
                </a>
                <a href="/logs.html" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    📋 任务日志
                </a>
                <a href="/submit.html" class="tab-link py-4 px-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    ➕ 手动提交
                </a>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 说明 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
            <div class="flex">
                <span class="text-2xl mr-3">💡</span>
                <div>
                    <h3 class="font-semibold text-blue-800">配置说明</h3>
                    <p class="text-sm text-blue-600 mt-1">
                        在此配置您的网盘Cookies，以实现自动转存功能。Cookies包含敏感信息，仅存储在数据库中用于网盘操作。
                    </p>
                </div>
            </div>
        </div>

        <!-- 网盘配置卡片 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- 夸克网盘 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <span class="text-3xl mr-3">🔵</span>
                        <div>
                            <h3 class="font-semibold text-lg">夸克网盘</h3>
                            <span id="quarkStatus" class="text-xs text-gray-500">点击保存后生效</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Cookies</label>
                        <textarea id="quarkCookies" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm font-mono" placeholder="粘贴Cookie字符串..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">转存目录</label>
                        <input id="quarkDir" type="text" value="/CY资源宝库" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex items-center">
                        <input id="quarkEnabled" type="checkbox" checked class="w-4 h-4 text-purple-600 rounded">
                        <label for="quarkEnabled" class="ml-2 text-sm text-gray-600">启用自动转存</label>
                    </div>
                    <button onclick="savePanConfig('quark')" class="w-full py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                        💾 保存配置
                    </button>
                </div>
            </div>

            <!-- 百度网盘 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <span class="text-3xl mr-3">🟢</span>
                        <div>
                            <h3 class="font-semibold text-lg">百度网盘</h3>
                            <span id="baiduStatus" class="text-xs text-gray-500">点击保存后生效</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Cookies</label>
                        <textarea id="baiduCookies" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm font-mono" placeholder="粘贴Cookie字符串..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">转存目录</label>
                        <input id="baiduDir" type="text" value="/CY资源宝库" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex items-center">
                        <input id="baiduEnabled" type="checkbox" checked class="w-4 h-4 text-purple-600 rounded">
                        <label for="baiduEnabled" class="ml-2 text-sm text-gray-600">启用自动转存</label>
                    </div>
                    <button onclick="savePanConfig('baidu')" class="w-full py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
                        💾 保存配置
                    </button>
                </div>
            </div>

            <!-- UC网盘 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <span class="text-3xl mr-3">🟡</span>
                        <div>
                            <h3 class="font-semibold text-lg">UC网盘</h3>
                            <span id="ucStatus" class="text-xs text-gray-500">点击保存后生效</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Cookies</label>
                        <textarea id="ucCookies" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm font-mono" placeholder="粘贴Cookie字符串..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">转存目录</label>
                        <input id="ucDir" type="text" value="/CY资源宝库" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex items-center">
                        <input id="ucEnabled" type="checkbox" checked class="w-4 h-4 text-purple-600 rounded">
                        <label for="ucEnabled" class="ml-2 text-sm text-gray-600">启用自动转存</label>
                    </div>
                    <button onclick="savePanConfig('uc')" class="w-full py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition font-medium">
                        💾 保存配置
                    </button>
                </div>
            </div>

            <!-- 迅雷网盘 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <span class="text-3xl mr-3">🟣</span>
                        <div>
                            <h3 class="font-semibold text-lg">迅雷网盘</h3>
                            <span id="thunderStatus" class="text-xs text-gray-500">点击保存后生效</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Cookies</label>
                        <textarea id="thunderCookies" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm font-mono" placeholder="粘贴Cookie字符串..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">转存目录</label>
                        <input id="thunderDir" type="text" value="/CY资源宝库" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex items-center">
                        <input id="thunderEnabled" type="checkbox" checked class="w-4 h-4 text-purple-600 rounded">
                        <label for="thunderEnabled" class="ml-2 text-sm text-gray-600">启用自动转存</label>
                    </div>
                    <button onclick="savePanConfig('thunder')" class="w-full py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                        💾 保存配置
                    </button>
                </div>
            </div>
        </div>

        <!-- 采集源配置 -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">🌐 采集源配置</h3>
                <button onclick="showAddSourceModal()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm">
                    ➕ 添加采集源
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">名称</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">URL</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">状态</th>
                            <th class="px-4 py-3 text-sm font-medium text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="sourcesList" class="divide-y divide-gray-100">
                        <tr><td colspan="4" class="px-4 py-8 text-center text-gray-400">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 添加采集源弹窗 -->
    <div id="sourceModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">添加采集源</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">名称</label>
                    <input id="sourceName" type="text" class="w-full px-3 py-2 border rounded-lg" placeholder="例如: Lsfa影视">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">URL</label>
                    <input id="sourceUrl" type="url" class="w-full px-3 py-2 border rounded-lg" placeholder="https://...">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideModal()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">取消</button>
                <button onclick="addSource()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">确认添加</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://musrilmjolaquhnfqjdu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11c3JpbG1qb2xhcWhuZnFqZHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTYyMzg3MDAsImV4cCI6MjAzMTgxNDcwMH0.gLl4KZJ6LK7sRBB5c8GJ4I0i_Xf6X8KQ8TqF6v6Q5r0';

        let supabase;

        async function init() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await loadSources();
            await loadPanConfigs();
        }

        async function loadPanConfigs() {
            try {
                const { data } = await supabase
                    .from('pan_config')
                    .select('*');

                if (data) {
                    data.forEach(config => {
                        const type = config.pan_type;
                        const cookiesEl = document.getElementById(type + 'Cookies');
                        const dirEl = document.getElementById(type + 'Dir');
                        const enabledEl = document.getElementById(type + 'Enabled');
                        const statusEl = document.getElementById(type + 'Status');

                        if (cookiesEl && config.cookies) {
                            cookiesEl.value = config.cookies;
                        }
                        if (dirEl) {
                            dirEl.value = config.target_dir || '/CY资源宝库';
                        }
                        if (enabledEl) {
                            enabledEl.checked = config.enabled === true || config.enabled === 1;
                        }
                        if (statusEl) {
                            statusEl.textContent = config.cookies ? '✅ 已配置' : '❌ 未配置';
                            statusEl.className = 'text-xs ' + (config.cookies ? 'text-green-500' : 'text-red-500');
                        }
                    });
                }
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }

        async function savePanConfig(panType) {
            const cookies = document.getElementById(panType + 'Cookies').value;
            const targetDir = document.getElementById(panType + 'Dir').value;
            const enabled = document.getElementById(panType + 'Enabled').checked;

            try {
                const { error } = await supabase
                    .from('pan_config')
                    .upsert({
                        pan_type: panType,
                        cookies: cookies,
                        target_dir: targetDir,
                        enabled: enabled,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'pan_type' });

                if (error) throw error;

                const statusEl = document.getElementById(panType + 'Status');
                if (cookies) {
                    statusEl.textContent = '✅ 已保存';
                    statusEl.className = 'text-xs text-green-500';
                }

                alert('✅ 配置保存成功！');
            } catch (error) {
                alert('❌ 保存失败: ' + error.message);
            }
        }

        async function loadSources() {
            try {
                const { data, error } = await supabase
                    .from('collect_sources')
                    .select('*')
                    .order('created_at', { ascending: false });

                const tbody = document.getElementById('sourcesList');

                if (error || !data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-400">暂无采集源</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(s => `
                    <tr>
                        <td class="px-4 py-3 font-medium">${s.name}</td>
                        <td class="px-4 py-3 text-sm text-gray-600 truncate max-w-xs">${s.url}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 ${s.enabled ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} rounded text-xs">${s.enabled ? '启用' : '禁用'}</span></td>
                        <td class="px-4 py-3">
                            <button onclick="deleteSource(${s.id})" class="text-red-500 hover:text-red-700 text-sm">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载采集源失败:', error);
            }
        }

        function showAddSourceModal() {
            document.getElementById('sourceModal').classList.remove('hidden');
            document.getElementById('sourceModal').classList.add('flex');
        }

        function hideModal() {
            document.getElementById('sourceModal').classList.add('hidden');
            document.getElementById('sourceModal').classList.remove('flex');
        }

        async function addSource() {
            const name = document.getElementById('sourceName').value.trim();
            const url = document.getElementById('sourceUrl').value.trim();

            if (!name || !url) {
                alert('请填写名称和URL');
                return;
            }

            try {
                const { error } = await supabase
                    .from('collect_sources')
                    .insert([{ name, url, enabled: true }]);

                if (error) throw error;

                hideModal();
                loadSources();
                document.getElementById('sourceName').value = '';
                document.getElementById('sourceUrl').value = '';
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        async function deleteSource(id) {
            if (!confirm('确定要删除这个采集源吗？')) return;

            try {
                const { error } = await supabase
                    .from('collect_sources')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                loadSources();
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
